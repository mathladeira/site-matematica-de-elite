<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Confirmação de pagamento - Matemática de Elite" />
    <title>Pagamento | Matemática de Elite</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="assets" href="assets/favicom_site.svg" type="image/svg+xml">
</head>
<!-- CORPO -->
<body>
    <!-- CABEÇALHO DO SITE -->
    <header>
        <div class="container header-content">
        <a href="index.html" class="brand"><img src="assets/logo_header.svg" alt="Matemática de Elite" /></a>
        <nav class="social">
            <a href="https://www.youtube.com/@matematicadeelite2026" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><img src="assets/icone_youtube.svg" alt="YouTube"></a>
            <a href="https://www.instagram.com/matheusladeira98" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><img src="assets/icone_instagram.svg" alt="Instagram"></a>
            <a href="https://wa.me/5591985430575" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><img src="assets/icone_whatsapp.svg" alt="WhatsApp"></a>
        </nav>
        </div>
    </header>
    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <section class="section">
            <div class="container">
                <h1>Quase lá...</h1>
                <p id="subtitle">Estamos confirmando seu pagamento com segurança.</p>
                <!-- SEÇÃO DE STATUS DO PAGAMENTO -->
                <div class="products" aria-label="Status do pagamento">
                    <div class="product-grid" style="grid-template-columns: 1fr;">
                        <article class="product-card">
                            <h3 class="product-title" id="statusTitle">Confirmando…</h3>
                            <p class="product-desc" id="statusText">
                                Se você acabou de pagar, isso pode levar alguns segundos.
                            </p>
                            <p class="product-note" id="sidBox" style="display:none;"></p>
                            <!-- BOTÃO BAIXAR MEU LIVRO -->
                            <a class="btn btn-primary" id="downloadBtn" href="#" style="display:none;" rel="noopener noreferrer">
                                Baixar meu livro
                            </a>
                            <!-- BOTÃO VOLTAR AO SITE -->
                            <a class="btn btn-ghost" id="backBtn" href="index.html" style="margin-top:12px;">
                                Voltar ao site
                            </a>
                            <!-- BOTÃO CHAMAR NO WHATSAPP -->
                            <a class="btn btn-ghost" id="backBtn" href="https://wa.me/5591985430575?text=Ol%C3%A1%21%20Estou%20tendo%20problemas%20na%20compra%20do%20seu%20livro%20e%20preciso%20de%20assistência." style="margin-top:12px;">
                                Chamar no WhatsApp
                            </a>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- RODAPÉ -->
    <footer>
        <div class="container footer-content">
        <small>© <span id="year"></span> Matemática de Elite. Todos os direitos reservados.</small>
        </div>
    </footer>
    <!-- SCRIPT QUE CHAMA O BACKEND -->
    <script>
        (() => {
        const BACKEND_BASE = "https://sitebackend-wandering-flower-7897.fly.dev";

        const elStatus = document.getElementById("statusText");      // se existir
        const elBoxPaid = document.getElementById("paidBox");        // se existir
        const elBtn = document.getElementById("downloadBtn");        // se existir
        const elCode = document.getElementById("orderCode");         // se existir

        function setText(txt) {
            if (elStatus) elStatus.textContent = txt;
            console.log("[OBRIGADO]", txt);
        }

        function getSid() {
            const params = new URLSearchParams(window.location.search);
            return params.get("sid");
        }

        async function checkOnce(sid) {
            const url = `${BACKEND_BASE}/pay/result?sid=${encodeURIComponent(sid)}`;
            const resp = await fetch(url, { method: "GET", cache: "no-store" });

            // se der ruim, mostra motivo (ajuda MUITO debug)
            if (!resp.ok) {
            const txt = await resp.text();
            throw new Error(`HTTP ${resp.status} - ${txt.slice(0, 200)}`);
            }
            return await resp.json();
        }

        async function pollPaid(sid, { intervalMs = 2000, timeoutMs = 90000 } = {}) {
            const t0 = Date.now();

            while (Date.now() - t0 < timeoutMs) {
            try {
                const data = await checkOnce(sid);

                // log pra você ver em tempo real no console
                console.log("[PAY RESULT]", data);

                if (data.paid) return data;

                setText(`Confirmando pagamento… (status: ${data.status || "?"})`);
            } catch (e) {
                console.warn("[POLL ERROR]", e);
                setText("Confirmando pagamento… (erro temporário ao consultar)");
            }

            await new Promise(r => setTimeout(r, intervalMs));
            }

            return { paid: false, timeout: true };
        }

        async function main() {
            const sid = getSid();
            if (!sid) {
            setText("Erro: sid ausente na URL.");
            return;
            }

            // se você mostra o código na tela
            if (elCode) elCode.textContent = sid;

            setText("Confirmando pagamento…");

            const res = await pollPaid(sid);

            if (res.paid) {
            setText("Pagamento confirmado ✅ Seu download está liberado.");

            // Mostra botão/link do download
            if (elBtn) {
                elBtn.style.display = "inline-block";
                elBtn.href = res.download_url;
                elBtn.target = "_blank";
                elBtn.rel = "noopener";
            } else {
                // fallback caso você não tenha botão: cria um link na página
                const a = document.createElement("a");
                a.href = res.download_url;
                a.textContent = "Baixar material";
                a.style.display = "inline-block";
                a.style.marginTop = "12px";
                a.target = "_blank";
                a.rel = "noopener";
                document.body.appendChild(a);
            }

            if (elBoxPaid) elBoxPaid.style.display = "block";
            return;
            }

            if (res.timeout) {
            setText("Ainda confirmando… Clique em recarregar em alguns segundos.");
            } else {
            setText("Pagamento ainda não confirmado.");
            }
        }

        document.addEventListener("DOMContentLoaded", main);
        })();
    </script>
</body>
</html>
