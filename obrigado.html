<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Confirmação de pagamento - Matemática de Elite" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="assets" href="assets/favicom_site.svg" type="image/svg+xml">
</head>
<!-- CORPO -->
<body>
    <!-- CABEÇALHO DO SITE -->
    <header>
        <div class="container header-content">
        <a href="index.html" class="brand"><img src="assets/logo_header.svg" alt="Matemática de Elite" /></a>
        <nav class="social">
            <a href="https://www.youtube.com/@matematicadeelite2026" target="_blank" rel="noopener noreferrer" aria-label="YouTube"><img src="assets/icone_youtube.svg" alt="YouTube"></a>
            <a href="https://www.instagram.com/matheusladeira98" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><img src="assets/icone_instagram.svg" alt="Instagram"></a>
            <a href="https://wa.me/5591985430575" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp"><img src="assets/icone_whatsapp.svg" alt="WhatsApp"></a>
        </nav>
        </div>
    </header>
    <!-- CONTEÚDO PRINCIPAL -->
    <main>
        <section class="section">
            <div class="container">
                <h1 id="MainTitle"></h1>
                <p id="subtitle"></p>
                <!-- SEÇÃO DE STATUS DO PAGAMENTO -->
                <div class="products" aria-label="Status do pagamento">
                    <div class="product-grid" style="grid-template-columns: 1fr;">
                        <article class="product-card">
                            <h3 class="product-title" id="statusTitle">Carregando…</h3>
                            <p class="product-desc" id="statusText">
                                Estamos consultando o status da sua trnsação.
                            </p>
                            <p class="product-note" id="sidBox" style="display:none;"></p>
                            <!-- BOTÃO BAIXAR MATERIAL -->
                            <a class="btn btn-primary" id="downloadBtn" style="display:none;" rel="noopener noreferrer"></a>
                            <!-- BOTÃO WHATSAPP EM DESTAQUE (AZUL) -->
                            <a class="btn btn-primary" id="whatsappPrimaryBtn" href="https://wa.me/5591985430575?text=Ol%C3%A1%21%20Meu%20link%20de%20download%20expirou%20e%20preciso%20de%20ajuda." target="_blank" rel="noopener" style="display:none;">
                                Chamar no WhatsApp
                            </a>
                            <!-- BOTÃO VOLTAR AO SITE -->
                            <a class="btn btn-ghost" id="backBtn" href="index.html">
                                Voltar ao site
                            </a>
                            <!-- BOTÃO WHATSAPP PADRÃO -->
                            <a class="btn btn-ghost" id="whatsappDefaultBtn" href="https://wa.me/5591985430575?text=Ol%C3%A1%21%20Estou%20tendo%20problemas%20na%20compra%20do%20seu%20livro%20e%20preciso%20de%20assistência.">
                                Chamar no WhatsApp
                            </a>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <!-- RODAPÉ -->
    <footer>
        <div class="container footer-content">
        <small>© <span id="year"></span> Matemática de Elite. Todos os direitos reservados.</small>
        </div>
    </footer>
    <!-- SCRIPT QUE CHAMA O BACKEND -->
    <script>
        (() => {
        const yearEl = document.getElementById("year");
        const elMainTitle = document.getElementById("MainTitle");
        const elSubtitle = document.getElementById("subtitle");
        const BACKEND_BASE = "https://sitebackend-wandering-flower-7897.fly.dev";
        const elTitle = document.getElementById("statusTitle");
        const elText = document.getElementById("statusText");
        const elBtnDownload = document.getElementById("downloadBtn");
        const elWhatsAppDefault = document.getElementById("whatsappDefaultBtn");
        const elWhatsAppPrimary = document.getElementById("whatsappPrimaryBtn");
        function setTitle(txt) {
            if (elTitle) elTitle.textContent = txt;
        }
        function setText(txt) {
            if (elText) elText.textContent = txt;
            console.log("[OBRIGADO]", txt);
        }
        function getSid() {
            const params = new URLSearchParams(window.location.search);
            return params.get("sid");
        }
        async function checkOnce(sid) {
            const url = `${BACKEND_BASE}/pay/result?sid=${encodeURIComponent(sid)}`;
            const resp = await fetch(url, { method: "GET", cache: "no-store" });
            if (!resp.ok) {
            const txt = await resp.text();
            throw new Error(`HTTP ${resp.status} - ${txt.slice(0, 200)}`);
            }
            return await resp.json();
        }
        async function pollStatus(sid, { intervalMs = 2000, timeoutMs = 60000 } = {}) {
            const t0 = Date.now();
            while (Date.now() - t0 < timeoutMs) {
            try {
                const data = await checkOnce(sid);
                console.log("[PAY RESULT]", data);
                if (data.state === "paid" || data.state === "failed") {
                return data;
                }
                setTitle(data.title || "Confirmando...");
                setText(data.message || "Estamos verificando o pagamento.");
            } catch (e) {
                console.warn("[POLL ERROR]", e);
                setText("Erro temporário ao consultar pagamento.");
            }
            await new Promise(r => setTimeout(r, intervalMs));
            }
            return { state: "pending", timeout: true };
        }
        async function main() {
            if (yearEl) yearEl.textContent = new Date().getFullYear();
            const sid = getSid();
            if (!sid) {
            if (elMainTitle) elMainTitle.textContent = "Erro";
            if (elSubtitle) elSubtitle.textContent = "Não foi possível identificar o pedido.";
            setTitle("Erro");
            setText("Identificador de pedido ausente.");
            return;
            }
            // Estado inicial neutro
            if (elMainTitle) elMainTitle.textContent = "Verificando pagamento...";
            if (elSubtitle) elSubtitle.textContent = "Aguarde alguns instantes.";
            setTitle("Confirmando...");
            setText("Estamos verificando seu pagamento.");
            const res = await pollStatus(sid);
            // === PAID ===
            if (res.state === "paid") {
            // 🔵 Token válido: download liberado
            if (res.download_url) {
                if (elMainTitle) elMainTitle.textContent = "Pagamento confirmado";
                if (elSubtitle) elSubtitle.textContent = "Seu acesso está liberado.";
                setTitle("Pagamento confirmado");
                setText("Seu pagamento foi aprovado com segurança. O download já está disponível.");
                if (elBtnDownload) {
                elBtnDownload.style.display = "flex";
                elBtnDownload.textContent = "Baixar material";
                elBtnDownload.href = res.download_url;
                elBtnDownload.target = "_blank";
                elBtnDownload.rel = "noopener";
                }
                if (elWhatsAppDefault) elWhatsAppDefault.style.display = "flex";
                if (elWhatsAppPrimary) elWhatsAppPrimary.style.display = "none";
                return;
            }
            // 🔴 Token expirado: WhatsApp azul
            if (elMainTitle) elMainTitle.textContent = "Link expirado";
            if (elSubtitle) elSubtitle.textContent = "Seu link anterior expirou por segurança.";
            setTitle("Link expirado");
            setText("Por segurança, o link de download expirou. Se você já efetuou o pagamento, entre em contato pelo WhatsApp.");
            if (elBtnDownload) elBtnDownload.style.display = "none";
            if (elWhatsAppDefault) elWhatsAppDefault.style.display = "none";
            if (elWhatsAppPrimary) elWhatsAppPrimary.style.display = "flex";
            return;
            }
            // === FAILED ===
            if (res.state === "failed") {
            if (elMainTitle) elMainTitle.textContent = "Pagamento não confirmado";
            if (elSubtitle) elSubtitle.textContent = "Não identificamos pagamento aprovado.";
            setTitle("Pagamento não confirmado");
            setText("O pagamento não foi aprovado. Você pode tentar novamente ou chamar no WhatsApp.");
            if (elBtnDownload) elBtnDownload.style.display = "none";
            if (elWhatsAppPrimary) elWhatsAppPrimary.style.display = "none";
            if (elWhatsAppDefault) elWhatsAppDefault.style.display = "flex";
            return;
            }
            // === PENDING (inclui timeout) ===
            if (elMainTitle) elMainTitle.textContent = "Confirmando pagamento...";
            if (elSubtitle) elSubtitle.textContent = "Estamos verificando sua transação.";
            setTitle("Confirmando...");
            setText("Se você pagou via PIX, pode levar alguns instantes. Atualize a página em breve.");
            if (elBtnDownload) elBtnDownload.style.display = "none";
            if (elWhatsAppPrimary) elWhatsAppPrimary.style.display = "none";
            if (elWhatsAppDefault) elWhatsAppDefault.style.display = "flex";
        }
        document.addEventListener("DOMContentLoaded", main);
        })();
    </script>
</body>
</html>
